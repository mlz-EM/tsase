run:
  name: run_field_ssneb_interpolated
  root: example/field_ssneb_runs/run_field_ssneb_interpolated

path:
  source:
    kind: control_points
    files:
      - ../../example/Pbam_SC_NC.cif
      - ../../example/Cluster#2_SC.cif
    indices: [0, 26]
  num_images: 27

model:
  calculator:
    kind: mace
    model_path: ../../example/MACE_model.model
    device: cuda
  charges:
    kind: species_map
    values:
      Pb: 2.0
      Zr: 4.0
      O: -2.0
  field:
    kind: crystal
    value: [-0.001, 0.0, 0.0]
  reference:
    kind: file
    file: ../../example/Pm-3m.cif

band:
  spring: 5.0
  method: ci
  ss: true
  weight: 1.0

constraints:
  filter:
    kind: ExpCellFilter
    mask: [0, 1, 0, 1, 0, 1]
    hydrostatic_strain: false
    constant_volume: false

optimizer:
  kind: fire
  dt: 0.10
  dtmax: 0.10
  maxmove: 0.10
  output_interval: 200
  plot_property: p_mag
  convergence:
    fmax: 0.01
    max_steps: 5000
  ci_activation:
    force: 0.5

outputs:
  path_snapshot:
    enabled: true
    schedule:
      every: 200
      include_final: true
  diagnostics:
    enabled: true
  energy_profile:
    enabled: true
  stem:
    enabled: true

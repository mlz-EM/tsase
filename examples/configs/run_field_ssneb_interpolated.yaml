run:
  name: run_field_ssneb_interpolated
  root: example/field_ssneb_runs/run_field_ssneb_interpolated

path:
  source:
    kind: control_points
    files:
      - "/home/gridsan/mzhu/Tools/STEM_TOOL/tsase/examples/structures/AFE_aligned_field_relax/structures/field_0003.cif"
      - "/home/gridsan/mzhu/Tools/STEM_TOOL/tsase/examples/structures/FEm_aligned_field_relax/structures/field_0003.cif"
      - "/home/gridsan/mzhu/Tools/STEM_TOOL/tsase/examples/structures/7-25-50_relaxed.cif"
      - "/home/gridsan/mzhu/Tools/STEM_TOOL/tsase/examples/structures/7-25-50_field_relax/structures/field_0003.cif"
    indices: [0, 5, 10, 15]
  num_images: 16

model:
  calculator:
    kind: mace_field
    model_path: "/home/gridsan/mzhu/Project/qe_examples/PZO/260311_ML/mace_field_transfer/runs/20260406_154128_nc_success/models/MACEField-finetuned.model"
    device: cuda
    head: ft_head
    default_dtype: float32

  charges:
    kind: species_map
    values:
      Pb: 2.0
      Zr: 4.0
      O: -2.0
  field:
    kind: cartesian
    value: [-0.001,  0.01, 0.0]
  reference:
    kind: file
    file: ../../example/Pm-3m.cif

band:
  spring: 1.0
  method: normal
  ss: true
  weight: 1.0

constraints:
  filter:
    mask: [0, 1, 0, 1, 0, 1]
    hydrostatic_strain: false
    constant_volume: false

optimizer:
  kind: fire
  dt: 0.10
  dtmax: 0.10
  maxmove: 0.10
  output_interval: 50
  convergence:
    fmax: 0.02
    max_steps: 5000
  ci_activation:
    force: 0.5

staging:
  remesh:
    - target_num_images: 31
      trigger:
        kind: stabilized_perp_force
        min_iterations: 200
        relative_drop: 0.3
        window: 5
        plateau_tolerance: 0.05
      max_wait_iterations: 200
      on_miss: force
    - target_num_images: 51
      trigger:
        kind: stabilized_perp_force
        min_iterations: 200
        relative_drop: 0.3
        window: 5
        plateau_tolerance: 0.05
      max_wait_iterations: 200
      on_miss: force

outputs:
  path_snapshot:
    enabled: true
    schedule:
      every: 50
      include_final: true
  diagnostics:
    enabled: true
  energy_profile:
    enabled: true
    emit_csv: true
    emit_png: true
    entries:
      - enthalpy_adjusted
      - intrinsic_energy
      - field_energy
      - polarization_mag
  stem:
    enabled: true

preprocess:
  output_dir: ../../example/preprocessed/run_field_ssneb_interpolated
  relax:
    enabled: true
    fmax: 0.05
  reference:
    symmetrize: true
    symprec: 1.0
  outputs:
    config_name: run_field_ssneb_interpolated_preprocessed.yaml
